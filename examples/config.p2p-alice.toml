[data]
directory = "~/.local/share/xmpp-p2p-alice"
import_bundled_if_empty = false

[connection]
default_transport = "direct-p2p"
api_host = "127.0.0.1"
api_port = 8765

[p2p]
local_jid = "alice@p2p.local"
listen_host = "127.0.0.1"
listen_port = 5223
mdns_enabled = false

[ui]
serve_web = true
web_host = "127.0.0.1"
web_port = 8767

[security]
allow_self_signed_direct = true
