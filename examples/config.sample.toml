[data]
directory = "~/.local/share/xmpp-p2p-chat"

[connection]
default_transport = "direct-p2p"
api_host = "127.0.0.1"
api_port = 8765
api_token = ""

[p2p]
local_jid = "alice@p2p.local"
listen_host = "0.0.0.0"
listen_port = 5223

[logging]
level = "INFO"
file = ""
json_file = ""       # Structured JSON for SigNoz / OTLP (e.g. ~/.local/share/xmpp-p2p-chat/service.json.log)
ebk_stderr = true    # @ebk status lines on stderr for AI terminals (Chaterm, OpenClaw)

[security]
enforce_tls = true
allow_self_signed_direct = true

[ui]
serve_web = true
web_host = "127.0.0.1"
web_port = 8767

[xmpp]
# Optional fallback — leave empty for pure serverless P2P mode
jid = ""
password = ""
server = ""
port = 5222
